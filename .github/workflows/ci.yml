name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    name: smoke (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Syntax check
        run: python -m compileall -q timelines.py

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Install from wheel
        run: pip install dist/*.whl

      - name: Console script runs
        run: timelines timelines.csv --svg-output /tmp/entry.svg --html-output /tmp/entry.html

      - name: Render bundled example (no args)
        run: python timelines.py

      - name: Render all palettes
        run: |
          for p in dark light uniform; do
            python timelines.py timelines.csv --palette "$p" \
              --svg-output "/tmp/$p.svg" --html-output "/tmp/$p.html"
          done

      - name: Render both text modes
        run: |
          python timelines.py timelines.csv --text-mode fixed \
            --svg-output /tmp/fixed.svg --html-output /tmp/fixed.html
          python timelines.py timelines.csv --text-mode auto \
            --svg-output /tmp/auto.svg --html-output /tmp/auto.html

      - name: Render day scale
        run: python timelines.py timelines.csv --scale day
          --svg-output /tmp/day.svg --html-output /tmp/day.html

      - name: Verify every output file is non-empty
        run: |
          for f in /tmp/entry.svg /tmp/entry.html \
                   /tmp/dark.svg /tmp/dark.html \
                   /tmp/light.svg /tmp/light.html \
                   /tmp/uniform.svg /tmp/uniform.html \
                   /tmp/fixed.svg /tmp/fixed.html \
                   /tmp/auto.svg /tmp/auto.html \
                   /tmp/day.svg /tmp/day.html \
                   timelines.svg timelines.html; do
            if [ ! -s "$f" ]; then
              echo "Missing or empty: $f"
              exit 1
            fi
          done

  web:
    name: web (node${{ matrix.node-version }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    strategy:
      fail-fast: false
      matrix:
        node-version: ["20", "22"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Verify timelines.py shipped in the build
        run: test -s dist/timelines.py && test -s dist/timelines.csv
